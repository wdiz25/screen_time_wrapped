name: screen_time_wrapped
description: "Screen Time Wrapped — Spotify Wrapped for your digital habits."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local storage (on-device only)
  shared_preferences: ^2.3.5

  # Android UsageStatsManager wrapper
  usage_stats: ^1.3.1

  # Google Fonts (Archivo Black + Inter)
  google_fonts: ^8.0.2

  # Slide progress indicator
  smooth_page_indicator: ^2.0.1

  # Number/date formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
