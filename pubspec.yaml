name: screen_time_wrapped
description: "Screen Time Wrapped — Spotify Wrapped for your digital habits."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Local storage (on-device only)
  shared_preferences: ^2.3.5

  # Android UsageStatsManager wrapper
  usage_stats: ^1.3.1

  # Charts
  fl_chart: ^0.70.2

  # Google Fonts (Archivo Black + Inter)
  google_fonts: ^6.2.1

  # Slide progress indicator
  smooth_page_indicator: ^1.2.0

  # Number/date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
